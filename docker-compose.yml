services:
  mysql:
    image: mysql:5.7
    container_name: avito_mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: avito_db
    ports:
      - "3306:3306"
    volumes:
      - ./db/db.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-data.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
